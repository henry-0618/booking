<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Henry Space 練團室預約系統</title>
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css' rel='stylesheet' />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; padding: 10px; }
    #calendar { max-width: 1100px; margin: 20px auto; background: #1e293b; padding: 15px; border-radius: 12px; border: 1px solid #334155; }
    
    /* 右側公告樣式 */
    #announcementSide { position: fixed; right: -360px; top: 60px; width: 340px; background: #1e293b; border-left: 4px solid #f59e0b; padding: 0; transition: 0.4s; z-index: 1002; box-shadow: -5px 0 20px rgba(0,0,0,0.6); border-radius: 8px 0 0 8px; }
    #announcementSide.active { right: 0; }
    #announcementTab { position: absolute; left: -45px; top: 20px; width: 45px; background: #f59e0b; color: #000; padding: 15px 5px; cursor: pointer; border-radius: 10px 0 0 10px; font-weight: bold; text-align: center; }
    .announce-content { padding: 20px; max-height: 80vh; overflow-y: auto; }
    .announce-header { color: #fcd34d; border-bottom: 1px solid #475569; padding-bottom: 10px; margin-bottom: 15px; font-size: 1.1rem; }
    .notice-box { background: #451a03; border: 1px solid #d97706; color: #fef3c7; padding: 15px; border-radius: 8px; font-size: 0.9rem; margin-bottom: 15px; }

    /* 彈窗樣式 */
    .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 25px; border-radius: 16px; border: 1px solid #475569; z-index: 1000; width: 90%; max-width: 450px; color: white; }
    .modal.active { display: block; }
    .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
    .overlay.active { display: block; }

    #toast { position: fixed; top: 20px; right: -350px; background: #10b981; color: white; padding: 15px 30px; border-radius: 8px; transition: 0.5s; z-index: 2000; font-weight: bold; }
    #toast.show { right: 20px; }

    .input-field { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; font-size: 1rem; }
    .input-field:disabled { opacity: 0.6; cursor: not-allowed; background: #1e293b; }
    
    .status-badge { display: inline-block; padding: 8px 20px; border-radius: 6px; font-size: 1.2rem; font-weight: bold; margin: 15px 0; width: 100%; text-align: center; box-sizing: border-box; }
    .btn-group { display: flex; gap: 10px; margin-top: 20px; }
    .btn { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-close { background: #475569; color: white; }

    /* 修正日曆標題格式：確保換行生效 */
    .fc-event-main-frame { flex-direction: column; }
    .fc-event-title { white-space: pre-wrap !important; font-size: 0.9rem !important; font-weight: 500; }
  </style>
</head>
<body>

  <div id="toast"></div>

  <div id="announcementSide">
    <div id="announcementTab" onclick="toggleAnnounce()">📢 公告與提醒</div>
    <div class="announce-content">
      <div class="announce-header">📢 預約須知與公告</div>
      <div class="notice-box">
        <b>【2026/04/03公告】</b> 本網站於4/3起改版，並優化版面及新增取消預約功能。<br><br>
        <b>【2026/02/10公告】</b>系統顯示不開放時段若需使用，請使用紙本申請。<br>🔗 <a href="https://reurl.cc/dq69W8" target="_blank" style="color:#fcd34d">紙本申請表連結</a>
      </div>
      <ul style="font-size: 0.85rem; color: #94a3b8; line-height: 1.6; padding-left: 15px;">
        <li>填寫資料時請務必完整填寫正確目的、電話、姓名。</li>
        <li>使用前20分請至資工組辦公室領取門禁卡。</li>
        <li>預約僅開放30天內，超過將視為無效。</li>
      </ul>
      <button class="btn btn-close" style="width:100%; margin-top:10px;" onclick="toggleAnnounce()">關閉</button>
    </div>
  </div>

  <h2 style="text-align: center;">🎸 Henry Space 練團室預約系統</h2>
  <div id='calendar'></div>

  <div class="overlay" id="overlay" onclick="closeAllModals()"></div>

  <div class="modal" id="bookingModal">
    <h3 id="modalTitle">建立預約</h3>
    <div style="font-size: 14px; color: #94a3b8;">預約人姓名：</div>
    <input type="text" id="userName" class="input-field">
    
    <div style="font-size: 14px; color: #94a3b8;">使用目的：</div>
    <input type="text" id="userPurpose" class="input-field">

    <div id="phoneInputArea">
      <div style="font-size: 14px; color: #94a3b8;">聯絡電話：</div>
      <input type="tel" id="userPhone" class="input-field" placeholder="身分識別與通知用">
    </div>
    
    <div style="font-size: 14px; color: #94a3b8; margin-top:10px;">開始時間：</div>
    <select id="startTime" class="input-field"></select>
    <div style="font-size: 14px; color: #94a3b8;">結束時間：</div>
    <select id="endTime" class="input-field"></select>

    <div id="statusArea" style="display:none;">
      <div style="font-size: 14px; color: #94a3b8;">審核狀態：</div>
      <div id="statusText" class="status-badge"></div>
    </div>

    <div class="btn-group">
      <button class="btn btn-close" onclick="closeAllModals()">返回</button>
      <button class="btn btn-danger" id="cancelBtn" style="display:none">取消預約</button>
      <button class="btn btn-primary" id="saveBtn">確認送出</button>
    </div>
  </div>

  <div class="modal" id="verifyModal" style="z-index:1001">
    <h3>驗證取消</h3>
    <p>請輸入預約時的電話以核對身分：</p>
    <input type="tel" id="verifyPhone" class="input-field" placeholder="請輸入電話">
    <div class="btn-group">
      <button class="btn btn-close" onclick="document.getElementById('verifyModal').classList.remove('active')">返回</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">確定取消預約</button>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx4y7C7SU777PWlv4hEF0QLAHRmjJG3-XfKDxSKlP290AbsYOmOdBrp78KwcvuZvAVN/exec';
    let calendar, currentInfo;

    function generateTimeOptions() {
      const start = document.getElementById('startTime');
      const end = document.getElementById('endTime');
      start.innerHTML = ''; end.innerHTML = '';
      for (let h = 8; h <= 23; h++) {
        for (let m of ['00', '30']) {
          const time = `${h.toString().padStart(2, '0')}:${m}`;
          start.innerHTML += `<option value="${time}">${time}</option>`;
          end.innerHTML += `<option value="${time}">${time}</option>`;
        }
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      generateTimeOptions();
      setTimeout(() => document.getElementById('announcementSide').classList.add('active'), 1000);

      var calendarEl = document.getElementById('calendar');
      calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        locale: 'zh-tw',
        allDaySlot: false,
        selectable: true,
        slotMinTime: '08:00:00',
        slotMaxTime: '23:30:00',
        slotDuration: '00:30:00',
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,timeGridDay' },
        
        events: function(info, successCallback, failureCallback) {
          fetch(GAS_URL)
            .then(res => res.json())
            .then(data => {
              // 2. 修復：過濾掉狀態為「已取消」的活動，不顯示在日曆上
              const activeEvents = data.filter(e => e.extendedProps.status !== "已取消")
                .map(e => ({
                  ...e,
                  // 1. 修正：格式化標題為 使用目的 \n 姓名 \n 狀態
                  title: `${e.title}\n${e.extendedProps.name}\n[${e.extendedProps.status || '等待審核'}]`,
                  backgroundColor: e.extendedProps.status === "核准使用" ? "#10b981" : "#f59e0b",
                  borderColor: 'transparent'
                }));
              successCallback(activeEvents);
            })
            .catch(err => console.error("抓取失敗", err));
        },

        select: function(info) { openBookingModal('new', info); },
        eventClick: function(info) { openBookingModal('detail', info.event); }
      });
      calendar.render();
    });

    function toggleAnnounce() { document.getElementById('announcementSide').classList.toggle('active'); }

    function openBookingModal(type, info) {
      currentInfo = info;
      document.getElementById('overlay').classList.add('active');
      document.getElementById('bookingModal').classList.add('active');
      
      const fields = ['userName', 'userPurpose', 'userPhone', 'startTime', 'endTime'];

      if(type === 'new') {
        document.getElementById('modalTitle').innerText = "建立預約";
        document.getElementById('saveBtn').style.display = "block";
        document.getElementById('cancelBtn').style.display = "none";
        document.getElementById('statusArea').style.display = "none";
        document.getElementById('phoneInputArea').style.display = "block"; // 預約時顯示電話輸入
        
        fields.forEach(id => {
          const el = document.getElementById(id);
          el.value = "";
          el.disabled = false;
        });

        document.getElementById('startTime').value = info.startStr.split('T')[1].substring(0,5);
        document.getElementById('endTime').value = info.endStr.split('T')[1].substring(0,5);
      } else {
        document.getElementById('modalTitle').innerText = "預約詳細資料";
        document.getElementById('saveBtn').style.display = "none";
        document.getElementById('cancelBtn').style.display = "block";
        document.getElementById('statusArea').style.display = "block";
        document.getElementById('phoneInputArea').style.display = "none"; // 詳情隱藏電話

        fields.forEach(id => document.getElementById(id).disabled = true);
        
        document.getElementById('userName').value = info.extendedProps.name;
        document.getElementById('userPurpose').value = info.title.split('\n')[0];
        document.getElementById('startTime').value = info.startStr.split('T')[1].substring(0,5);
        document.getElementById('endTime').value = info.endStr.split('T')[1].substring(0,5);
        
        const status = info.extendedProps.status || "等待審核";
        const st = document.getElementById('statusText');
        st.innerText = status;
        st.style.background = (status === "核准使用" ? "#10b981" : "#f59e0b");
      }
    }

    // 3. 整合後的新增預約邏輯
    document.getElementById('saveBtn').onclick = function() {
      const name = document.getElementById('userName').value;
      const purpose = document.getElementById('userPurpose').value;
      const phone = document.getElementById('userPhone').value; // 直接從輸入框讀取
      const startT = document.getElementById('startTime').value;
      const endT = document.getElementById('endTime').value;
      
      if(!name || !purpose || !phone) return alert("姓名、目的與電話均為必填");

      const dateStr = currentInfo.startStr.split('T')[0];
      this.innerText = "傳送中...";
      this.disabled = true;
      
      fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'save',
          data: { name, purpose, phone, start: `${dateStr}T${startT}:00`, end: `${dateStr}T${endT}:00` }
        })
      }).then(() => {
        showToast("✅ 預約已送出，請等候審核");
        setTimeout(() => location.reload(), 1500);
      });
    };

    document.getElementById('cancelBtn').onclick = () => document.getElementById('verifyModal').classList.add('active');

    document.getElementById('confirmDeleteBtn').onclick = function() {
      const phone = document.getElementById('verifyPhone').value;
      if(!phone) return alert("請輸入電話以供驗證");

      this.innerText = "處理中...";
      fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'delete',
          data: { name: currentInfo.extendedProps.name, start: currentInfo.startStr, phone: phone }
        })
      }).then(res => res.json()).then(res => {
        if(res.success) {
          showToast("🗑️ " + res.msg);
          setTimeout(() => location.reload(), 1500);
        } else {
          alert(res.msg);
          this.innerText = "確定取消預約";
        }
      });
    };

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function closeAllModals() {
      document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
      document.getElementById('overlay').classList.remove('active');
    }
  </script>
</body>
</html>
